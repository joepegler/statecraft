name: Deploy Docs

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["dev"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  sdk-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.4"

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run SDK Tests
        run: bun test

  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.4"

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Set Docs Base Path
        run: |
          # If docs/public/CNAME exists, GitHub Pages serves the site at the custom apex (BASE_PATH /).
          CNAME_FILE="docs/public/CNAME"
          if [ -f "$CNAME_FILE" ]; then
            DOMAIN=$(tr -d '\r' < "$CNAME_FILE" | sed '/^$/d' | head -n1 | tr -d '[:space:]')
            if [ -n "$DOMAIN" ]; then
              echo "BASE_PATH=/" >> "$GITHUB_ENV"
              exit 0
            fi
          fi
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/${REPO}/" >> "$GITHUB_ENV"
          fi

      - name: Build Docs
        run: bun run docs:build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
